<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フルコポ — Fool or Corporation</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== TITLE SCREEN ===== -->
  <div id="screen-title" class="screen active">
    <div class="title-bg"></div>
    <div class="title-content">
      <div class="title-en">FOOL or CORPORATION</div>
      <div class="title-jp">フルコポ</div>
      <p class="title-sub">6人用・役職カードゲーム</p>
      <button class="btn-main" onclick="Game.showScreen('screen-setup')">ゲームをはじめる</button>
    </div>
  </div>

  <!-- ===== SETUP SCREEN ===== -->
  <div id="screen-setup" class="screen">
    <div class="screen-inner">
      <h2 class="screen-title">プレイヤー設定</h2>
      <p class="screen-sub">あなたの名前と友達5人の名前を入力してください</p>
      <div id="player-inputs" class="player-inputs"></div>
      <button class="btn-main" onclick="Game.startGame()">ゲーム開始</button>
      <button class="btn-sub" onclick="Game.showScreen('screen-title')">← もどる</button>
    </div>
  </div>

  <!-- ===== ROLE REVEAL SCREEN ===== -->
  <div id="screen-role" class="screen">
    <div class="screen-inner">
      <h2 class="screen-title" id="role-player-name"></h2>
      <p class="screen-sub">あなたの役職カードを確認してください</p>
      <div id="role-card-wrap" class="role-card-wrap">
        <div class="role-card face-down" id="role-card" onclick="Game.flipRoleCard()">
          <div class="role-card-front">?</div>
          <div class="role-card-back">
            <div class="role-icon" id="role-icon"></div>
            <div class="role-name" id="role-name"></div>
            <div class="role-desc" id="role-desc"></div>
          </div>
        </div>
      </div>
      <button class="btn-main hidden" id="btn-role-next" onclick="Game.nextRoleReveal()">確認した →</button>
      <p class="hint-text">カードをタップして役職を確認</p>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="round-info">
        <span class="round-label">ROUND</span>
        <span class="round-num" id="round-num">1</span>
      </div>
      <button class="btn-score" onclick="Game.toggleScoreboard()">スコア</button>
    </div>

    <!-- 対戦相手の手札表示エリア -->
    <div class="opponents-area" id="opponents-area"></div>

    <!-- 場のカード -->
    <div class="field-area" id="field-area">
      <div class="field-label">場のカード</div>
      <div class="field-cards" id="field-cards"></div>
    </div>

    <!-- プレイヤーの手札 -->
    <div class="player-area">
      <div class="player-info-bar">
        <span id="my-name-label" class="my-name"></span>
        <span id="my-rounds-label" class="my-rounds"></span>
      </div>
      <div class="hand-cards" id="hand-cards"></div>
    </div>

    <!-- メッセージ -->
    <div class="message-bar" id="message-bar"></div>
  </div>

  <!-- ===== JOKER OVERLAY ===== -->
  <div id="joker-overlay" class="overlay hidden">
    <div class="overlay-box">
      <div class="overlay-title">🃏 ジョーカーを出す</div>
      <p class="overlay-desc">もう1枚手札を見せてください。<br>そのカードの代わりとして機能します。</p>
      <div class="hand-cards small" id="joker-hand"></div>
      <button class="btn-sub" onclick="Game.cancelJoker()">キャンセル</button>
    </div>
  </div>

  <!-- ===== RESULT OVERLAY ===== -->
  <div id="result-overlay" class="overlay hidden">
    <div class="overlay-box">
      <div class="result-badge" id="result-badge"></div>
      <div class="result-cards" id="result-cards"></div>
      <button class="btn-main" onclick="Game.nextRound()">次のラウンドへ →</button>
    </div>
  </div>

  <!-- ===== SCOREBOARD OVERLAY ===== -->
  <div id="score-overlay" class="overlay hidden">
    <div class="overlay-box wide">
      <div class="overlay-title">スコアボード</div>
      <div id="score-list" class="score-list"></div>
      <button class="btn-sub" onclick="Game.toggleScoreboard()">とじる</button>
    </div>
  </div>

  <!-- ===== FINAL RESULT SCREEN ===== -->
  <div id="screen-final" class="screen">
    <div class="screen-inner">
      <div class="final-title">GAME SET</div>
      <div class="final-winner" id="final-winner"></div>
      <div class="final-role" id="final-role"></div>
      <div class="final-score-list" id="final-score-list"></div>
      <button class="btn-main" onclick="Game.showScreen('screen-title')">タイトルへ</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
